<script>
(function() {

    var quotes = $(".code");
    var quoteIndex = -1;

    function showNextQuote() {
        ++quoteIndex;

        if (quotes.eq(quoteIndex % quotes.length).text() == "write code." && quoteIndex == 0) {
        		quotes.eq(quoteIndex % quotes.length)
            .fadeIn(2000)
            .delay(000)
            .fadeOut(1500, showNextQuote);
            
            
        	}

        	else {
        
        	quotes.eq(quoteIndex % quotes.length)
            .fadeIn(1500)
            .delay(1000)
            .fadeOut(1500, showNextQuote);
    }
        }
        

    showNextQuote();

})();
